<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="popup.css"
    />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Did I Apply?</h1>
        <button
          id="settings-btn"
          title="Settings"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle
              cx="8"
              cy="8"
              r="2.5"
            />
            <path
              d="M13.5 8a5.5 5.5 0 0 0-.1-.8l1.3-1-1.2-2-1.5.5a5.4 5.4 0 0 0-1.4-.8L10.2 2H7.8l-.4 1.9a5.4 5.4 0 0 0-1.4.8L4.5 4.2l-1.2 2 1.3 1a5.5 5.5 0 0 0 0 1.6l-1.3 1 1.2 2 1.5-.5c.4.3.9.6 1.4.8L7.8 14h2.4l.4-1.9c.5-.2 1-.5 1.4-.8l1.5.5 1.2-2-1.3-1a5.5 5.5 0 0 0 .1-.8z"
            />
          </svg>
        </button>
      </header>

      <div
        id="settings-panel"
        class="hidden"
      >
        <label for="spreadsheet-id"
          >Spreadsheet ID</label
        >
        <input
          type="text"
          id="spreadsheet-id"
          placeholder="Paste your Google Spreadsheet ID"
        />
        <button id="save-settings">
          Save
        </button>
        <p class="hint">
          Find it in your spreadsheet
          URL:<br />
          docs.google.com/spreadsheets/d/<b>{ID}</b>/edit
        </p>
      </div>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>
          Checking your applications...
        </p>
      </div>

      <div id="no-job" class="hidden">
        <div class="empty-state">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#b0b0b0"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect
              x="2"
              y="7"
              width="20"
              height="14"
              rx="2"
            />
            <path
              d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"
            />
          </svg>
          <p>No job listing detected</p>
        </div>
      </div>

      <div
        id="job-detected"
        class="hidden"
      >
        <div id="job-info">
          <p
            class="job-title"
            id="job-title"
          ></p>
          <p
            class="job-company"
            id="job-company"
          ></p>
          <p
            class="job-salary hidden"
            id="job-salary"
          ></p>
        </div>

        <div
          id="already-applied"
          class="hidden"
        >
          <div
            class="status-banner status-found"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle
                cx="8"
                cy="8"
                r="6.5"
              />
              <path
                d="M5.5 8l2 2 3.5-3.5"
              />
            </svg>
            Previously applied
          </div>
          <div
            id="applications-list"
          ></div>
        </div>

        <div
          id="not-applied"
          class="hidden"
        >
          <div
            class="status-banner status-new"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle
                cx="8"
                cy="8"
                r="6.5"
              />
              <path d="M8 5v6M5 8h6" />
            </svg>
            New company
          </div>
          <button id="add-btn">
            <span class="btn-label"
              >Add to Tracker</span
            >
            <span
              class="btn-spinner hidden"
            ></span>
          </button>
        </div>

        <div id="added" class="hidden">
          <div
            class="status-banner status-success"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle
                cx="8"
                cy="8"
                r="6.5"
              />
              <path
                d="M5.5 8l2 2 3.5-3.5"
              />
            </svg>
            Added to tracker
          </div>
        </div>
      </div>

      <div id="error" class="hidden">
        <div class="error-banner">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle
              cx="8"
              cy="8"
              r="6.5"
            />
            <path d="M8 5v4M8 11v.5" />
          </svg>
          <p id="error-message"></p>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
